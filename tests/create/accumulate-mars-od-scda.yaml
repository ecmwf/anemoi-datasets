dates:
  frequency: 6h
  start: 2021-01-10 18:00:00
  end: 2021-01-12 12:00:00

input:
  accumulate:
    period: 6h
    availability:
      # Use all four base times (00, 06, 12, 18 UTC).
      # The mars source auto-selects stream "scda" for 06 and 18.
      - [0, "0-6/0-12"]
      - [6, "0-6/0-12"]
      - [12, "0-6/0-12"]
      - [18, "0-6/0-12"]
    source:
      mars:
        expver: "0001"
        class: od
        stream: oper
        type: fc
        grid: 20./20.
        levtype: sfc
        param: [tp, cp]


checks:
  none: {}
